<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>SimBioSe-W</title>
  <script>
    // 1. Die bevorzugte Browsersprache ermitteln
    var userLang = navigator.language || navigator.userLanguage; 
    
    // 2. Den aktuellen URL-Anker (z.B. #räuber-beute-modell) auslesen
    var currentHash = window.location.hash;
    
    // 3. Sprachgesteuert weiterleiten UND den Anker anhängen
    // window.location.replace ist besser als .href, damit der "Zurück"-Button im Browser nicht blockiert wird
    if (userLang.startsWith('en')) {
      window.location.replace("./en/" + currentHash); // Zur englischen Version + Anker
    } else {
      window.location.replace("./de/" + currentHash); // Zur deutschen Version + Anker
    }
  </script>
</head>
<body>
  <p>Loading / Wird geladen...</p>
</body>
</html>
