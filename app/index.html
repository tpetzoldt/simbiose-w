<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>SimBioSe-W</title>
  <script>
    // Get the preferred language of the browser
    var userLang = navigator.language || navigator.userLanguage; 
    
    // If the language starts with "en" redirect to /en/ otherwise to /de/
    if (userLang.startsWith('en')) {
      window.location.href = "./en/"; // English app version
    } else {
      window.location.href = "./de/"; // German app version
    }
  </script>
</head>
<body>
  <p>Loading / Wird geladen...</p>
</body>
</html>
